<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AdventureCore</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: arial, sans-serif;
            font-size: 14px;
            background-color: #fff;
            color: #222;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        .header {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            padding: 6px;
            gap: 15px;
        }

        .header a {
            color: #222;
            text-decoration: none;
            padding: 5px 8px;
            border-radius: 2px;
            transition: background-color 0.3s;
        }

        .header a:hover {
            background-color: #f8f9fa;
        }

        .apps-menu {
            padding: 8px;
            border-radius: 50%;
            transition: background-color 0.3s;
            cursor: pointer;
        }

        .apps-menu:hover {
            background-color: #f8f9fa;
        }

        .apps-grid {
            width: 18px;
            height: 18px;
            background-image:
                radial-gradient(circle, #5f6368 2px, transparent 2px),
                radial-gradient(circle, #5f6368 2px, transparent 2px),
                radial-gradient(circle, #5f6368 2px, transparent 2px),
                radial-gradient(circle, #5f6368 2px, transparent 2px),
                radial-gradient(circle, #5f6368 2px, transparent 2px),
                radial-gradient(circle, #5f6368 2px, transparent 2px),
                radial-gradient(circle, #5f6368 2px, transparent 2px),
                radial-gradient(circle, #5f6368 2px, transparent 2px),
                radial-gradient(circle, #5f6368 2px, transparent 2px);
            background-size: 6px 6px;
            background-position:
                0 0, 6px 0, 12px 0,
                0 6px, 6px 6px, 12px 6px,
                0 12px, 6px 12px, 12px 12px;
            background-repeat: no-repeat;
        }

        .sign-in-btn {
            background-color: #1a73e8;
            color: white !important;
            padding: 9px 23px !important;
            border-radius: 4px;
            font-weight: 500;
            border: 1px solid transparent;
        }

        .sign-in-btn:hover {
            background-color: #1557b0 !important;
            box-shadow: 0 1px 2px 0 rgba(66,133,244,0.3), 0 1px 3px 1px rgba(66,133,244,0.15);
        }

        /* Main content */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            margin-top: -150px;
        }

        .google-logo {
            margin-bottom: 35px;
        }

        .logo-text {
            font-size: 70px;
            font-weight: normal;
            letter-spacing: -3px;
        }

        .logo-g1 { color: #4285f4; }
        .logo-o1 { color: #ea4335; }
        .logo-o2 { color: #fbbc05; }
        .logo-g2 { color: #4285f4; }
        .logo-l  { color: #34a853; }
        .logo-e  { color: #ea4335; }

        /* Search container */
        .search-container {
            width: 100%;
            max-width: 584px;
            margin-bottom: 30px;
        }

        .search-box {
            display: flex;
            align-items: center;
            border: 1px solid #dfe1e5;
            border-radius: 24px;
            height: 44px;
            padding: 0 20px;
            box-shadow: 0 2px 5px 1px rgba(64,60,67,0.16);
            transition: box-shadow 0.3s;
        }

        .search-box:hover {
            box-shadow: 0 2px 8px 1px rgba(64,60,67,0.24);
        }

        .search-box.focused {
            border-color: #4285f4;
            box-shadow: 0 2px 8px 1px rgba(66,133,244,0.24);
        }

        .search-icon {
            width: 20px;
            height: 20px;
            margin-right: 13px;
            opacity: 0.3;
        }

        .search-input {
            flex: 1;
            border: none;
            outline: none;
            font-size: 16px;
            color: #222;
            background: transparent;
        }

        .voice-search, .camera-search {
            width: 24px;
            height: 24px;
            margin-left: 12px;
            cursor: pointer;
            opacity: 0.54;
            transition: opacity 0.3s;
        }

        .voice-search:hover, .camera-search:hover {
            opacity: 0.8;
        }

        /* Buttons */
        .button-container {
            display: flex;
            gap: 14px;
            margin-top: 30px;
        }

        .search-btn {
            background-color: #f8f9fa;
            border: 1px solid #f8f9fa;
            border-radius: 4px;
            color: #3c4043;
            font-size: 14px;
            margin: 0;
            padding: 0 20px;
            height: 36px;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
        }

        .search-btn:hover {
            box-shadow: 0 1px 1px rgba(0,0,0,0.1);
            background-color: #f1f3f4;
            border-color: #dadce0;
            color: #202124;
        }

        /* Footer */
        .footer {
            background-color: #f2f2f2;
            border-top: 1px solid #e4e4e4;
        }

        .footer-top {
            padding: 15px 30px;
            border-bottom: 1px solid #dadce0;
            color: #70757a;
            font-size: 15px;
        }

        .footer-bottom {
            display: flex;
            justify-content: space-between;
            padding: 0 20px;
            flex-wrap: wrap;
        }

        .footer-left, .footer-right {
            display: flex;
            gap: 0;
        }

        .footer a {
            color: #70757a;
            text-decoration: none;
            padding: 15px;
            transition: color 0.3s;
        }

        .footer a:hover {
            color: #222;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .logo-text {
                font-size: 55px;
            }

            .footer-bottom {
                flex-direction: column;
                align-items: center;
            }

            .footer-left, .footer-right {
                justify-content: center;
            }
        }

        @media (max-width: 480px) {
            .logo-text {
                font-size: 40px;
                letter-spacing: -2px;
            }

            .button-container {
                flex-direction: column;
                align-items: center;
                gap: 10px;
            }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <div class="header">
        <a href="bus.html">Bus Signs</a>
        <a href="train.html">Train Signs</a>
        <div class="apps-menu">
            <div class="apps-grid"></div>
        </div>
        <a href="#" class="sign-in-btn">Sign in</a>
    </div>

    <!-- Main content -->
    <div class="main">
        <div class="google-logo">
            <div class="logo-text">
                <span class="logo-g1">A</span><span class="logo-o1">d</span><span class="logo-o2">v</span><span class="logo-g2">e</span><span class="logo-l">n</span><span class="logo-e">t</span><span class="logo-g1">u</span><span class="logo-o1">r</span><span class="logo-o2">e</span><span class="logo-g2">C</span><span class="logo-l">o</span><span class="logo-e">r</span><span class="logo-g1">e</span>
            </div>
        </div>

        <div class="search-container">
            <div class="search-box" id="searchBox">
                <svg class="search-icon" focusable="false" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                    <path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"></path>
                </svg>
                <input type="text" class="search-input" id="searchInput" autocomplete="off" spellcheck="false" role="combobox" aria-expanded="false" placeholder="">
                <svg class="voice-search" focusable="false" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                    <path d="m12 15c1.66 0 3-1.31 3-2.97v-7.02c0-1.66-1.34-3.01-3-3.01s-3 1.34-3 3.01v7.02c0 1.66 1.34 2.97 3 2.97z"></path>
                    <path d="m11 18.08h2v3.92h-2z"></path>
                    <path d="m7.05 16.87c-1.27-1.33-2.05-2.83-2.05-4.87h2c0 1.45 0.56 2.42 1.47 3.38v0.32l-1.15 1.18z"></path>
                    <path d="m16.95 16.87c1.27-1.33 2.05-2.83 2.05-4.87h-2c0 1.45-0.56 2.42-1.47 3.38v0.32l1.15 1.18z"></path>
                </svg>
                <svg class="camera-search" focusable="false" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192">
                    <rect fill="none" height="192" width="192"></rect>
                    <g>
                        <circle fill="#34a853" cx="144.07" cy="144" r="16"></circle>
                        <circle fill="#4285f4" cx="96.07" cy="104" r="24"></circle>
                        <path fill="#ea4335" d="M24,135.2c0,18.11,14.69,32.8,32.8,32.8H96v-16l-40.1-0.1c-8.8,0-15.9-8.19-15.9-17.9v-18H24V135.2z"></path>
                        <path fill="#fbbc04" d="M168,72.8c0-18.11-14.69-32.8-32.8-32.8H116v16l19.9,0.1c8.8,0,16,8.29,16,18v18h16V72.8z"></path>
                        <path fill="#4285f4" d="M112,24v40L68,64H56.8C38.69,64,24,78.69,24,96.8V112h16V96.8c0-9.71,7.2-16.8,16.9-16.8H112V24z"></path>
                    </g>
                </svg>
            </div>
        </div>

        <div class="button-container">
            <a href="bus.html" class="search-btn">🚌 Bus Stop Sign Maker</a>
            <a href="train.html" class="search-btn">🚇 Train Station Sign Maker</a>
        </div>
    </div>

    <!-- Footer -->
    <div class="footer">
        <div class="footer-top">
            Adventure Friends HQ
        </div>
        <div class="footer-bottom">
            <div class="footer-left">
                <a href="#">About</a>
                <a href="bus.html">Bus Signs</a>
                <a href="train.html">Train Signs</a>
            </div>
            <div class="footer-right">
                <a href="#">Privacy</a>
                <a href="#">Terms</a>
                <a href="#">Settings</a>
            </div>
        </div>
    </div>

    <script>
        const searchBox = document.getElementById('searchBox');
        const searchInput = document.getElementById('searchInput');

        searchInput.addEventListener('focus', () => {
            searchBox.classList.add('focused');
        });

        searchInput.addEventListener('blur', () => {
            searchBox.classList.remove('focused');
        });

        searchInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                const query = searchInput.value.trim();
                if (query) {
                    window.open(`https://www.google.com/search?q=${encodeURIComponent(query)}`, '_blank');
                }
            }
        });

        document.querySelector('.voice-search').addEventListener('click', () => {
            alert('Voice search not yet implemented!');
        });

        document.querySelector('.camera-search').addEventListener('click', () => {
            alert('Image search not yet implemented!');
        });

        document.querySelector('.apps-menu').addEventListener('click', () => {
            alert('Apps menu not yet implemented!');
        });
    </script>
</body>
</html>
