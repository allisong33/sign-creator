<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MBTA Bus Stop Sign Maker</title>
<style>
:root{--bg:#f5f1e8;--card:#fff;--ink:#212322;--muted:#666;--border:#d8d2c5}
*{box-sizing:border-box}
body{margin:0;font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Helvetica Neue",Arial,sans-serif;background:var(--bg);color:var(--ink)}
main{max-width:1150px;margin:0 auto;padding:64px 28px 28px}
.site-nav{position:fixed;top:0;left:0;right:0;height:36px;background:#f5f1e8;border-bottom:1px solid #d8d2c5;display:flex;align-items:center;justify-content:space-between;padding:0 20px;z-index:100;font-size:13px}
.site-nav a{color:#212322;text-decoration:none;font-weight:600;padding:4px 8px;border-radius:6px;transition:background .15s}
.site-nav a:hover{background:#e8e4db}
.nav-home{font-weight:800}
.nav-right{display:flex;gap:4px}
.nav-current{background:#F9B326;color:#212322!important}
h1{margin:0 0 8px;font-size:clamp(28px,4vw,44px);letter-spacing:-.04em}
.intro{margin:0 0 24px;color:var(--muted);line-height:1.45}
.app{display:grid;grid-template-columns:minmax(280px,360px) 1fr;gap:20px;align-items:start}
.controls,.preview{background:var(--card);border:1px solid var(--border);border-radius:18px;box-shadow:0 12px 30px rgba(0,0,0,.06)}
.controls{padding:18px;position:sticky;top:16px}
.group{margin-bottom:16px}
label,.group-label{display:block;font-weight:700;font-size:13px;margin-bottom:7px;text-transform:uppercase;letter-spacing:.04em}
input[type=text],textarea{width:100%;border:1px solid var(--border);border-radius:12px;padding:11px 12px;font-size:16px;font-family:inherit;background:#fff}
textarea{min-height:86px;resize:vertical;line-height:1.25}
.check{display:flex;align-items:center;gap:9px;margin:9px 0;font-size:15px;text-transform:none;letter-spacing:0;font-weight:400}
input[type=checkbox]{width:18px;height:18px}
.buttons{display:grid;gap:9px;margin-top:16px}
button{appearance:none;border:0;border-radius:999px;padding:10px 14px;background:var(--ink);color:white;font-weight:700;cursor:pointer;font-family:inherit}
button.secondary{background:var(--ink)}
button.add{background:#F9B326;color:#212322}
button.remove{background:#b71c1c;color:#fff}
button.export{background:#546e7a}
.note{margin-top:14px;color:var(--muted);font-size:13px;line-height:1.4}
.mode-toggle{display:flex;gap:8px;margin-bottom:16px}
.mode-toggle button{flex:1;background:#e8e4db;color:var(--ink);font-size:13px;padding:8px 10px}
.mode-toggle button.active{background:#F9B326;color:#212322}
select{width:100%;border:1px solid var(--border);border-radius:12px;padding:11px 12px;font-size:16px;font-family:inherit;background:#fff;appearance:none;cursor:pointer}
select:disabled{opacity:.5;cursor:default}
.api-msg{font-size:13px;margin-top:6px;line-height:1.4;color:var(--muted)}
.api-msg.error{color:#c0392b}
.spinner{display:inline-block;width:14px;height:14px;border:2px solid var(--border);border-top-color:var(--ink);border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}
.section-divider{display:flex;align-items:center;gap:8px;margin-bottom:16px}
.section-divider hr{flex:1;border:none;border-top:1px solid var(--border)}
.section-divider span{font-size:12px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.06em}
.stop-list{max-height:180px;overflow-y:auto;border:1px solid var(--border);border-radius:12px;background:#fff;margin-top:0}
.stop-item{padding:10px 12px;cursor:pointer;font-size:16px;border-bottom:1px solid var(--border)}
.stop-item:last-child{border-bottom:none}
.stop-item:hover{background:#f0ece3}
.stop-item.no-results{color:var(--muted);cursor:default;font-style:italic}
.preview{padding:18px;overflow:auto;display:flex;justify-content:center}
.preview svg{display:block;width:min(100%,266px);height:auto;background:#fff}
@media(max-width:850px){main{padding:18px}.app{grid-template-columns:1fr}.controls{position:static}.preview svg{width:min(100%,238px)}}

<p class="intro">Create a bus stop sign. Enter route details manually, then export as SVG or PNG.</p>

<template id="route-block-template">
  <div class="route-block" style="border:1px solid var(--border);border-radius:12px;padding:12px;margin-bottom:10px">
    <div class="group"><label>Route number</label><input type="text" class="route-number" value="" autocomplete="off"></div>
    <div class="group"><label>Destination text</label><textarea class="route-dest" style="min-height:70px"></textarea></div>
    <div class="group"><label class="check"><input type="checkbox" class="route-clock">Show frequent-service symbol</label></div>
    <button type="button" class="remove-route remove" style="width:100%">Remove route</button>
  </div>
</template>

<script type="module">
import { renderSign, getSignSvgString } from './src/bus/renderer.js';
import { fetchBusRoutes, fetchStopsForRoute, fetchRoutesForStop, fetchStopName } from './src/bus/api.js';

const MAX_ROUTES = 5;
let _currentStops = [];
let _exportStopName = '';

function getRouteBlocks() {
  return Array.from(document.querySelectorAll('#route-blocks .route-block'));
}

function currentState() {
  const stopInput = document.getElementById('stopNumber');
  return {
    stopNumber: stopInput.value.trim() || '',
    routes: getRouteBlocks().map(block => ({
      routeNumber: block.querySelector('.route-number').value.trim() || '',
      displayText: block.querySelector('.route-dest').value.trim()   || '',
      showClock:   block.querySelector('.route-clock').checked,
    })),
  };
}

function refresh() { renderSign(currentState()); }

function syncButtons() {
  const blocks = getRouteBlocks();
  document.getElementById('addRoute').disabled = blocks.length >= MAX_ROUTES;
  blocks.forEach(b => {
    b.querySelector('.remove-route').disabled = blocks.length <= 1;
  });
}

function addRouteBlock(defaults = {}) {
  const tmpl = document.getElementById('route-block-template');
  const clone = tmpl.content.cloneNode(true);
  const block = clone.querySelector('.route-block');
  if (defaults.routeNumber !== undefined) block.querySelector('.route-number').value = defaults.routeNumber;
  if (defaults.displayText  !== undefined) block.querySelector('.route-dest').value   = defaults.displayText;
  if (defaults.showClock    !== undefined) block.querySelector('.route-clock').checked = defaults.showClock;

  block.querySelector('.remove-route').addEventListener('click', () => {
    block.remove(); syncButtons(); refresh();
  });
  block.querySelectorAll('input, textarea').forEach(el => {
    el.addEventListener('input',  refresh);
    el.addEventListener('change', refresh);
  });

  document.getElementById('route-blocks').appendChild(block);
  syncButtons();
}

document.getElementById('addRoute').addEventListener('click', () => {
  addRouteBlock({ routeNumber: '', displayText: '', showClock: false });
  refresh();
});

document.getElementById('stopNumber').addEventListener('input',  () => { _exportStopName = ''; refresh(); });
document.getElementById('stopNumber').addEventListener('change', () => { _exportStopName = ''; refresh(); });

// Export helpers
function slug(v) { return String(v).toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-+|-+$/g, '') || 'bus'; }
function firstRoute() { return getRouteBlocks()[0]; }
function filename(ext) {
  const r = firstRoute();
  const rn = r ? r.querySelector('.route-number').value : '';
  const sn = _exportStopName ? `-${slug(_exportStopName)}` : '';
  return `bus-route-${slug(rn)}${sn}-stop-${slug(document.getElementById('stopNumber').value)}.${ext}`;
}
function svgBlob() { return new Blob([getSignSvgString()], { type: 'image/svg+xml;charset=utf-8' }); }
function downloadBlob(blob, name) {
  const url = URL.createObjectURL(blob), a = document.createElement('a');
  a.href = url; a.download = name; document.body.appendChild(a); a.click(); a.remove();
  URL.revokeObjectURL(url);
}

document.getElementById('openSvg').addEventListener('click', () => {
  const url = URL.createObjectURL(svgBlob());
  window.open(url, '_blank', 'noopener,noreferrer');
  setTimeout(() => URL.revokeObjectURL(url), 60000);
});
document.getElementById('downloadSvg').addEventListener('click', () => downloadBlob(svgBlob(), filename('svg')));
// Browsers taint the canvas when an SVG with <foreignObject> is drawn onto it,
// blocking toBlob(). For PNG export we replace each foreignObject with native
// SVG <text>/<tspan> elements so no foreignObject ever touches the canvas.
function stripForeignObjects(svgEl) {
  const NS = 'http://www.w3.org/2000/svg';
  const measureCtx = document.createElement('canvas').getContext('2d');
  Array.from(svgEl.querySelectorAll('foreignObject')).forEach(fo => {
    const div = fo.querySelector('div');
    const rawText = div ? div.textContent.trim() : '';
    if (!rawText) { fo.remove(); return; }

    const x        = parseFloat(fo.getAttribute('x')      || 0);
    const y        = parseFloat(fo.getAttribute('y')      || 0);
    const maxW     = parseFloat(fo.getAttribute('width')  || 626);
    const fontSize = 100;
    const lineH    = 110; // font-size * line-height (1.1)
    // ~85px = half-leading (5px) + ascent (~80px) positions the alphabetic baseline
    const baseline = y + 85;

    measureCtx.font = `600 ${fontSize}px 'Arial Narrow', Arial, sans-serif`;
    const words = rawText.split(/\s+/);
    const lines = [];
    let cur = '';
    for (const w of words) {
      const test = cur ? cur + ' ' + w : w;
      if (measureCtx.measureText(test).width > maxW && cur) { lines.push(cur); cur = w; }
      else cur = test;
    }
    if (cur) lines.push(cur);

    const textEl = document.createElementNS(NS, 'text');
    textEl.setAttribute('fill', '#000000');
    textEl.setAttribute('font-family', "'Arial Narrow', Arial, sans-serif");
    textEl.setAttribute('font-size', fontSize);
    textEl.setAttribute('font-weight', '600');
    lines.forEach((line, i) => {
      const ts = document.createElementNS(NS, 'tspan');
      ts.setAttribute('x', x);
      ts.setAttribute('y', baseline + i * lineH);
      ts.textContent = line;
      textEl.appendChild(ts);
    });
    fo.parentNode.replaceChild(textEl, fo);
  });
}

document.getElementById('downloadPng').addEventListener('click', () => {
  const svgEl = document.getElementById('main-mbta-sign');
  const vb = svgEl.getAttribute('viewBox').split(' ').map(Number);
  const scale = 2;
  const clone = svgEl.cloneNode(true);
  clone.setAttribute('width', vb[2]);
  clone.setAttribute('height', vb[3]);
  stripForeignObjects(clone);
  const url = URL.createObjectURL(new Blob([new XMLSerializer().serializeToString(clone)], { type: 'image/svg+xml;charset=utf-8' }));
  const img = new Image();
  img.onload = () => {
    const c = document.createElement('canvas');
    c.width = vb[2] * scale; c.height = vb[3] * scale;
    c.getContext('2d').drawImage(img, 0, 0, c.width, c.height);
    try {
      c.toBlob(b => { URL.revokeObjectURL(url); if (b) downloadBlob(b, filename('png')); else alert('PNG export failed.'); }, 'image/png');
    } catch (e) {
      URL.revokeObjectURL(url);
      alert('PNG export failed: ' + e.message);
    }
  };
  img.onerror = () => { URL.revokeObjectURL(url); alert('PNG export failed.'); };
  img.src = url;
});

// Mode switching
let _routesCache = null;

function setMode(mode) {
  document.getElementById('custom-panel').style.display   = mode === 'custom' ? '' : 'none';
  document.getElementById('api-panel').style.display      = mode === 'api'    ? '' : 'none';
  document.getElementById('stopNumberGroup').style.display = mode === 'custom' ? '' : 'none';
  document.getElementById('modeCustom').classList.toggle('active', mode === 'custom');
  document.getElementById('modeApi').classList.toggle('active', mode === 'api');
  if (mode === 'api') loadRoutes();
}

document.getElementById('modeCustom').addEventListener('click', () => setMode('custom'));
document.getElementById('modeApi').addEventListener('click', () => setMode('api'));

async function lookupByStopNumber(stopId) {
  const msg = document.getElementById('apiStopLookupMsg');
  const btn = document.getElementById('apiStopLookupBtn');
  if (!stopId) { msg.textContent = 'Enter a stop number.'; msg.className = 'api-msg error'; return; }
  btn.disabled = true;
  msg.innerHTML = '<span class="spinner"></span>Loading…';
  msg.className = 'api-msg';
  let routes, stopName;
  try {
    [routes, stopName] = await Promise.all([
      fetchRoutesForStop(stopId),
      fetchStopName(stopId),
    ]);
  } catch (e) {
    msg.textContent = 'Could not load stop. Check the number and your connection.';
    msg.className = 'api-msg error';
    btn.disabled = false;
    return;
  }
  if (routes.length === 0) {
    msg.textContent = 'No bus routes found for that stop number.';
    msg.className = 'api-msg error';
    btn.disabled = false;
    return;
  }
  btn.disabled = false;
  msg.textContent = '';
  _exportStopName = stopName || '';
  document.getElementById('route-blocks').innerHTML = '';
  routes.slice(0, MAX_ROUTES).forEach(route => {
    addRouteBlock({ routeNumber: route.shortName, displayText: route.destination, showClock: route.isFrequent });
  });
  document.getElementById('stopNumber').value = stopId;
  setMode('custom');
  refresh();
}

document.getElementById('apiStopLookupBtn').addEventListener('click', () => {
  lookupByStopNumber(document.getElementById('apiStopLookup').value.trim());
});
document.getElementById('apiStopLookup').addEventListener('keydown', e => {
  if (e.key === 'Enter') lookupByStopNumber(document.getElementById('apiStopLookup').value.trim());
});

async function loadRoutes() {
  const sel = document.getElementById('apiRoute');
  const msg = document.getElementById('apiRouteMsg');
  if (_routesCache) { populateRouteSelect(_routesCache); return; }
  sel.innerHTML = '<option value="">Select a route…</option>';
  sel.disabled = true;
  msg.innerHTML = '<span class="spinner"></span>Loading routes…';
  msg.className = 'api-msg';
  try {
    _routesCache = await fetchBusRoutes();
    populateRouteSelect(_routesCache);
    msg.textContent = '';
  } catch (e) {
    sel.innerHTML = '<option value="">Failed to load</option>';
    msg.textContent = 'Could not reach MBTA API. Check your connection.';
    msg.className = 'api-msg error';
  } finally {
    sel.disabled = false;
  }
}

function populateRouteSelect(routes) {
  const sel = document.getElementById('apiRoute');
  sel.innerHTML = '<option value="">Select a route…</option>' +
    routes.map(r => `<option value="${r.id}" data-frequent="${r.isFrequent}">${r.shortName} — ${r.longName}</option>`).join('');
}

function renderStopList(stops) {
  const list = document.getElementById('apiStopList');
  if (stops.length === 0) {
    list.innerHTML = '<div class="stop-item no-results">No stops match</div>';
  } else {
    list.innerHTML = stops.map(s =>
      `<div class="stop-item" data-id="${s.id}" data-name="${s.name.replace(/"/g, '&quot;')}">${s.name}</div>`
    ).join('');
    list.querySelectorAll('.stop-item').forEach(item => {
      item.addEventListener('click', () => selectStop(item.dataset.id, item.dataset.name));
    });
  }
  list.style.display = '';
}

function filterStops() {
  const search = document.getElementById('apiStopSearch').value.toLowerCase();
  const filtered = search
    ? _currentStops.filter(s => s.name.toLowerCase().includes(search))
    : _currentStops;
  renderStopList(filtered);
}

document.getElementById('apiStopSearch').addEventListener('input', filterStops);

document.getElementById('apiRoute').addEventListener('change', async function () {
  const routeId = this.value;
  const stopGroup  = document.getElementById('apiStopGroup');
  const stopList   = document.getElementById('apiStopList');
  const stopMsg    = document.getElementById('apiStopMsg');
  _currentStops = [];
  stopGroup.style.display = 'none';
  stopList.style.display = 'none';
  stopList.innerHTML = '';
  document.getElementById('apiStopSearch').value = '';
  stopMsg.textContent = '';
  stopMsg.className = 'api-msg';
  if (!routeId) return;
  stopGroup.style.display = '';
  stopMsg.innerHTML = '<span class="spinner"></span>Loading stops…';
  stopMsg.className = 'api-msg';
  try {
    const stops = await fetchStopsForRoute(routeId);
    _currentStops = stops;
    renderStopList(stops);
    stopMsg.textContent = '';
  } catch (e) {
    stopMsg.textContent = 'Could not load stops.';
    stopMsg.className = 'api-msg error';
  }
});

async function selectStop(stopId, stopName) {
  const stopMsg = document.getElementById('apiStopMsg');
  const list    = document.getElementById('apiStopList');
  list.style.display = 'none';
  document.getElementById('apiStopSearch').value = stopName;
  stopMsg.innerHTML = '<span class="spinner"></span>Loading all routes for this stop…';
  stopMsg.className = 'api-msg';

  let routes;
  try {
    routes = await fetchRoutesForStop(stopId);
  } catch (e) {
    stopMsg.textContent = 'Could not load routes for this stop.';
    stopMsg.className = 'api-msg error';
    return;
  }
  stopMsg.textContent = '';
  _exportStopName = stopName;

  document.getElementById('route-blocks').innerHTML = '';
  routes.slice(0, MAX_ROUTES).forEach(route => {
    addRouteBlock({
      routeNumber: route.shortName,
      displayText: route.destination,
      showClock:   route.isFrequent,
    });
  });

  document.getElementById('stopNumber').value = stopId;
  setMode('custom');
  refresh();
}

function startOver() {
  _exportStopName = '';
  _currentStops = [];
  document.getElementById('route-blocks').innerHTML = '';
  addRouteBlock({ routeNumber: '', displayText: '', showClock: false });
  document.getElementById('stopNumber').value = '';
  document.getElementById('apiStopLookup').value = '';
  document.getElementById('apiStopLookupMsg').textContent = '';
  document.getElementById('apiStopLookupMsg').className = 'api-msg';
  document.getElementById('apiStopGroup').style.display = 'none';
  document.getElementById('apiStopList').innerHTML = '';
  document.getElementById('apiStopList').style.display = 'none';
  document.getElementById('apiStopSearch').value = '';
  document.getElementById('apiStopMsg').textContent = '';
  document.getElementById('apiStopMsg').className = 'api-msg';
  setMode('api');
  refresh();
}

document.getElementById('startOver').addEventListener('click', startOver);

// Initialize in API mode (routes load on first switch)
addRouteBlock({ routeNumber: '', displayText: '', showClock: false });
setMode('api');
refresh();
</script>
</body>
</html>
