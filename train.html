<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MBTA-Style Station Sign Maker</title>
  <style>
    :root {
      --page-bg: #f5f1e8;
      --panel-bg: #ffffff;
      --ink: #212322;
      --muted: #666;
      --border: #d8d2c5;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
      background: var(--page-bg);
      color: var(--ink);
    }

    main { max-width: 1100px; margin: 0 auto; padding: 28px; }
    h1 { margin: 0 0 8px; font-size: clamp(28px, 4vw, 44px); letter-spacing: -0.04em; }
    .intro { margin: 0 0 24px; color: var(--muted); font-size: 16px; line-height: 1.45; }

    .app-shell {
      display: grid;
      grid-template-columns: minmax(260px, 340px) 1fr;
      gap: 20px;
      align-items: start;
    }

    .controls, .preview-card {
      background: var(--panel-bg);
      border: 1px solid var(--border);
      border-radius: 18px;
      box-shadow: 0 12px 30px rgba(0,0,0,.06);
    }

    .controls { padding: 18px; position: sticky; top: 16px; }

    .control-group { margin-bottom: 16px; }

    label, .group-label {
      display: block;
      font-weight: 700;
      font-size: 13px;
      margin-bottom: 7px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    input[type="text"], select {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 11px 12px;
      font-size: 16px;
      font-family: inherit;
      background: #fff;
    }

    select { appearance: none; cursor: pointer; }
    select:disabled { opacity: .5; cursor: default; }

    .checkbox-row {
      display: flex;
      align-items: center;
      gap: 9px;
      margin: 9px 0;
      font-size: 15px;
    }

    input[type="checkbox"] { width: 18px; height: 18px; }

    .button-row { display: grid; gap: 9px; margin-top: 16px; }

    button {
      appearance: none;
      border: 0;
      border-radius: 999px;
      padding: 10px 14px;
      background: var(--ink);
      color: white;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
    }

    button.export { background: #546e7a; }
    button.start-over { background: #e8e4db; color: var(--ink); width: 100%; margin-top: 10px; }

    .mode-toggle { display: flex; gap: 8px; margin-bottom: 16px; }
    .mode-toggle button { flex: 1; background: #e8e4db; color: var(--ink); font-size: 13px; padding: 8px 10px; }
    .mode-toggle button.active { background: #F9B326; color: #212322; }

    .section-divider { display: flex; align-items: center; gap: 8px; margin-bottom: 16px; }
    .section-divider hr { flex: 1; border: none; border-top: 1px solid var(--border); }
    .section-divider span { font-size: 12px; color: var(--muted); font-weight: 700; text-transform: uppercase; letter-spacing: .06em; }

    .stop-list { max-height: 200px; overflow-y: auto; border: 1px solid var(--border); border-radius: 12px; background: #fff; }
    .stop-item { padding: 10px 12px; cursor: pointer; font-size: 16px; border-bottom: 1px solid var(--border); }
    .stop-item:last-child { border-bottom: none; }
    .stop-item:hover { background: #f0ece3; }
    .stop-item.no-results { color: var(--muted); cursor: default; font-style: italic; }

    .note { margin-top: 14px; color: var(--muted); font-size: 13px; line-height: 1.4; }

    .preview-card { padding: 18px; overflow: auto; }
    .preview-card svg { display: block; width: 100%; height: auto; background: #fff; }

    code { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: 0.92em; }

    @media (max-width: 800px) {
      main { padding: 18px; }
      .app-shell { grid-template-columns: 1fr; }
      .controls { position: static; }
    }
  </style>
</head>
<body>
  <main>
    <h1>MBTA-Style Station Sign Maker</h1>
    <p class="intro">Create a train station sign. Choose a station from the data or build one manually, then export as SVG or PNG.</p>

    <div class="app-shell">
      <section class="controls" aria-label="Sign controls">

        <div class="mode-toggle">
          <button id="modeData" type="button" class="active">Use Station Data</button>
          <button id="modeCustom" type="button">Custom</button>
        </div>

        <!-- Data panel -->
        <div id="data-panel">
          <div class="section-divider"><hr><span>Choose a station</span><hr></div>
          <div class="control-group">
            <label for="trainLine">Line</label>
            <select id="trainLine">
              <option value="">Select a line…</option>
              <option value="green">Green Line</option>
              <option value="red">Red Line</option>
              <option value="orange">Orange Line</option>
              <option value="blue">Blue Line</option>
              <option value="silver">Silver Line</option>
              <option value="commuter">Commuter Rail</option>
            </select>
          </div>
          <div class="control-group" id="stationGroup" style="display:none">
            <label>Station</label>
            <input id="trainStationSearch" type="text" placeholder="Search stations…" autocomplete="off" style="margin-bottom:6px">
            <div id="trainStationList" class="stop-list" style="display:none"></div>
          </div>
          <div id="accessibilityInfo" style="display:none; margin-top:10px; font-size:14px; color:var(--muted);">
            <strong style="display:block; margin-bottom:6px; font-size:12px; text-transform:uppercase; letter-spacing:.06em;">Accessibility</strong>
            <div id="facilityList"></div>
          </div>
        </div>

        <!-- Custom panel -->
        <div id="custom-panel" style="display:none">
          <div class="section-divider"><hr><span>Enter details</span><hr></div>
          <div class="control-group">
            <label for="stationName">Station name</label>
            <input id="stationName" type="text" value="MBTA Station" autocomplete="off" />
          </div>
        </div>

        <!-- Always-visible controls -->
        <div class="control-group">
          <label for="subtitleText">Sub-header text</label>
          <input id="subtitleText" type="text" value="" autocomplete="off" placeholder="e.g. RED LINE" />
        </div>
        <div class="control-group" id="lineColorGroup" style="display:none">
          <label for="lineChoice">Line color</label>
          <select id="lineChoice">
            <option value="green">Green Line</option>
            <option value="red" selected>Red Line</option>
            <option value="orange">Orange Line</option>
            <option value="blue">Blue Line</option>
            <option value="silver">Silver Line</option>
            <option value="commuter">Commuter Rail</option>
          </select>
        </div>

        <div class="control-group">
          <label for="leftIcon">Left icon 1</label>
          <select id="leftIcon">
            <option value="none">None</option>
            <option value="elevator">Elevator</option>
            <option value="escalator">Escalator</option>
            <option value="wheelchair">Wheelchair</option>
            <option value="airplane">Airplane</option>
            <option value="arrowLeft">Left Arrow</option>
            <option value="arrowRight">Right Arrow</option>
            <option value="bus">Bus</option>
          </select>
        </div>

        <div class="control-group">
          <label for="leftIcon2">Left icon 2</label>
          <select id="leftIcon2">
            <option value="none">None</option>
            <option value="elevator">Elevator</option>
            <option value="escalator">Escalator</option>
            <option value="wheelchair">Wheelchair</option>
            <option value="airplane">Airplane</option>
            <option value="arrowLeft">Left Arrow</option>
            <option value="arrowRight">Right Arrow</option>
            <option value="bus">Bus</option>
          </select>
        </div>

        <div class="control-group">
          <label for="rightIcon">Right icon 1</label>
          <select id="rightIcon">
            <option value="none">None</option>
            <option value="elevator">Elevator</option>
            <option value="escalator">Escalator</option>
            <option value="wheelchair">Wheelchair</option>
            <option value="airplane">Airplane</option>
            <option value="arrowLeft">Left Arrow</option>
            <option value="arrowRight">Right Arrow</option>
            <option value="bus">Bus</option>
          </select>
        </div>

        <div class="control-group">
          <label for="rightIcon2">Right icon 2</label>
          <select id="rightIcon2">
            <option value="none">None</option>
            <option value="elevator">Elevator</option>
            <option value="escalator">Escalator</option>
            <option value="wheelchair">Wheelchair</option>
            <option value="airplane">Airplane</option>
            <option value="arrowLeft">Left Arrow</option>
            <option value="arrowRight">Right Arrow</option>
            <option value="bus">Bus</option>
          </select>
        </div>

        <div class="control-group">
          <span class="group-label">Optional pieces</span>
          <label class="checkbox-row">
            <input id="showMaps" type="checkbox" />
            Show two maps underneath
          </label>
        </div>

        <div class="button-row">
          <button id="openSvg" type="button" class="export">Open SVG in New Tab</button>
          <button id="downloadSvg" type="button" class="export">Download SVG</button>
          <button id="downloadPng" type="button" class="export">Download PNG</button>
        </div>

        <button id="startOver" type="button" class="start-over">Start Over</button>

        <p class="note">Serve over HTTP: <code>python3 -m http.server 8080</code></p>
      </section>

      <section>
        <div class="preview-card">
          <div id="preview" aria-label="Generated SVG preview"></div>
        </div>
      </section>
    </div>
  </main>

  <script type="module">
    import { LINES } from './src/train/data.js';
    import { fetchStationFacilities } from './src/train/api.js';

    const MAP_ASSETS = {
      spider: 'public/assets/train/maps/map-rapid-transit-and-frequent-bus-routes.png',
    };

    const LINE_OPTIONS = {
      green:   { label: 'Green Line',    subtitle: 'GREEN LINE',    color: '#00843D', map: 'public/assets/train/maps/map-green-line.png' },
      red:     { label: 'Red Line',      subtitle: 'RED LINE',      color: '#DA291C', map: 'public/assets/train/maps/map-red-line.png' },
      orange:  { label: 'Orange Line',   subtitle: 'ORANGE LINE',   color: '#ED8B00', map: 'public/assets/train/maps/map-orange-line-2890px-version.png' },
      blue:    { label: 'Blue Line',     subtitle: 'BLUE LINE',     color: '#003DA5', map: 'public/assets/train/maps/map-blue-line.png' },
      silver:  { label: 'Silver Line',   subtitle: 'SILVER LINE',   color: '#7C878E', map: 'public/assets/train/maps/map-silver-line.png' },
      commuter:{ label: 'Commuter Rail', subtitle: 'COMMUTER RAIL', color: '#80276C', map: 'public/assets/train/maps/map-commuter-rail.png' },
    };

    const ICON_OPTIONS = {
      none:       { label: 'None',        href: '' },
      elevator:   { label: 'Elevator',    href: 'public/assets/train/icons/icon-elevator.svg' },
      escalator:  { label: 'Escalator',   href: 'public/assets/train/icons/icon-escalator.svg' },
      wheelchair: { label: 'Wheelchair',  href: 'public/assets/train/icons/icon-wheelchair.svg' },
      airplane:   { label: 'Airplane',    href: 'public/assets/train/icons/icon-airplane.svg' },
      arrowLeft:  { label: 'Left Arrow',  href: 'public/assets/train/icons/icon-arrow-left-circle.svg' },
      arrowRight: { label: 'Right Arrow', href: 'public/assets/train/icons/icon-arrow-right-circle.svg' },
      bus:        { label: 'Bus',         href: 'public/assets/train/icons/icon-bus-no-outline.svg' },
    };

    const els = {
      stationName:  document.getElementById('stationName'),
      subtitleText: document.getElementById('subtitleText'),
      lineChoice:   document.getElementById('lineChoice'),
      leftIcon:     document.getElementById('leftIcon'),
      leftIcon2:    document.getElementById('leftIcon2'),
      rightIcon:    document.getElementById('rightIcon'),
      rightIcon2:   document.getElementById('rightIcon2'),
      showMaps:     document.getElementById('showMaps'),
      preview:      document.getElementById('preview'),
      openSvg:      document.getElementById('openSvg'),
      downloadSvg:  document.getElementById('downloadSvg'),
      downloadPng:  document.getElementById('downloadPng'),
    };

    function slug(v) {
      return String(v).toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-+|-+$/g, '') || 'station';
    }

    function escapeXml(value) {
      return String(value)
        .replaceAll('&', '&amp;').replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;').replaceAll('"', '&quot;').replaceAll("'", '&apos;');
    }

    // Converts a relative asset path to an absolute URL so that SVG exports
    // (blob URLs, downloaded files) can resolve the images — relative paths
    // have no base when loaded outside the page context.
    function assetUrl(path) {
      return new URL(path, window.location.href).href;
    }

    const ICON_X = { 'left-1': 407, 'left-2': 459, 'right-1': 1100, 'right-2': 1152 };

    function iconImage(iconKey, slot) {
      const icon = ICON_OPTIONS[iconKey];
      if (!icon || !icon.href) return '';
      return `<image href="${escapeXml(assetUrl(icon.href))}" x="${ICON_X[slot]}" y="196" width="44" height="44" preserveAspectRatio="xMidYMid meet"/>`;
    }

    function buildSvg() {
      const line        = LINE_OPTIONS[els.lineChoice.value] || LINE_OPTIONS.red;
      const stationName = escapeXml(els.stationName.value.trim() || 'MBTA STATION').toUpperCase();
      const subtitle    = escapeXml(els.subtitleText.value.trim()).toUpperCase();
      const showMaps    = els.showMaps.checked;
      const i1      = iconImage(els.leftIcon.value,  'left-1');
      const i2      = iconImage(els.leftIcon2.value, 'left-2');
      const i3      = iconImage(els.rightIcon.value, 'right-1');
      const i4      = iconImage(els.rightIcon2.value,'right-2');
      const allIcons = i1 + i2 + i3 + i4;
      const icons   = allIcons ? `<g id="Icon_Section">${allIcons}</g>` : '';

      const viewBox = showMaps ? '398.5 61.25 803 647.25' : '398.5 79.5 803 174';
      const width   = showMaps ? '804' : '803';
      const height  = showMaps ? '648' : '174';

      const defs = showMaps ? `<defs>
  <image width="2890" height="2890" id="img1" href="${escapeXml(assetUrl(MAP_ASSETS.spider))}"/>
  <image width="2890" height="2890" id="img2" href="${escapeXml(assetUrl(line.map))}"/>
</defs>` : '';

      const maps = showMaps ? `<g id="Map_Section">
  <use href="#img1" transform="matrix(.1384,0,0,.1384,401.5,257)"/>
  <use href="#img2" transform="matrix(.1384,0,0,.1384,801.5,257)"/>
  <rect x="401.5" y="253" width="400" height="402" fill="none" stroke="#000" stroke-width="3"/>
  <rect x="801.5" y="253" width="400" height="402" fill="none" stroke="#000" stroke-width="3"/>
</g>` : '';

      return `<svg version="1.2" xmlns="http://www.w3.org/2000/svg" viewBox="${viewBox}" width="${width}" height="${height}">${defs}
<style>tspan{white-space:pre}.s-line{fill:${line.color}}.s-bg{fill:#fff}.t-station{font-size:90px;fill:#fff;font-family:"Helvetica Neue",Helvetica,Arial,sans-serif;font-weight:600}.t-sub{font-size:50px;fill:#000;font-family:"Helvetica Neue",Helvetica,Arial,sans-serif;font-weight:600}</style>
${maps}
<g id="Header_Section">
  <path class="s-line" d="m1201.5 79.5v105h-800v-105z"/>
  <path class="s-bg" d="m1201.5 184.5v68.5h-800v-68.5z"/>
  <rect x="401.5" y="79.5" width="800" height="173.5" fill="none" stroke="#000" stroke-width="3"/>
  <text x="801.5" y="132" text-anchor="middle" dominant-baseline="central" class="t-station">${stationName}</text>
  <text x="801.5" y="218.75" text-anchor="middle" dominant-baseline="central" class="t-sub">${subtitle}</text>${icons}
</g>
</svg>`;
    }

    function render() { els.preview.innerHTML = buildSvg(); }

    function filename(ext) {
      const line    = els.lineChoice.value || 'train';
      const station = els.stationName.value.trim() || 'station';
      return `train-${slug(line)}-${slug(station)}.${ext}`;
    }

    function svgBlobUrl() {
      return URL.createObjectURL(new Blob([buildSvg()], { type: 'image/svg+xml;charset=utf-8' }));
    }

    function downloadBlob(blob, name) {
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = name; document.body.appendChild(a); a.click(); a.remove();
      URL.revokeObjectURL(url);
    }

    // Input wiring
    for (const input of [els.stationName, els.subtitleText, els.lineChoice,
                         els.leftIcon, els.leftIcon2, els.rightIcon, els.rightIcon2, els.showMaps]) {
      input.addEventListener('input',  render);
      input.addEventListener('change', render);
    }

    els.lineChoice.addEventListener('change', () => {
      const line = LINE_OPTIONS[els.lineChoice.value] || LINE_OPTIONS.green;
      els.subtitleText.value = line.subtitle;
      render();
    });

    // Export buttons
    els.openSvg.addEventListener('click', () => {
      const url = svgBlobUrl();
      window.open(url, '_blank', 'noopener,noreferrer');
      setTimeout(() => URL.revokeObjectURL(url), 60000);
    });

    els.downloadSvg.addEventListener('click', () => {
      downloadBlob(new Blob([buildSvg()], { type: 'image/svg+xml;charset=utf-8' }), filename('svg'));
    });

    async function urlToDataUri(url) {
      const resp = await fetch(url);
      const blob = await resp.blob();
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload  = () => resolve(reader.result);
        reader.onerror = reject;
        reader.readAsDataURL(blob);
      });
    }

    async function buildSvgForPng() {
      let svg = buildSvg();
      // Find every absolute href (set by assetUrl()) and replace with base64 data URI
      // so the canvas doesn't get tainted by external-origin blob-URL references.
      const urls = [...new Set([...svg.matchAll(/href="(https?:\/\/[^"]+)"/g)].map(m => m[1]))];
      await Promise.all(urls.map(async u => {
        const dataUri = await urlToDataUri(u);
        svg = svg.replaceAll(`href="${u}"`, `href="${dataUri}"`);
      }));
      return svg;
    }

    els.downloadPng.addEventListener('click', async () => {
      const showMaps = els.showMaps.checked;
      const w = showMaps ? 804 : 803;
      const h = showMaps ? 648 : 174;
      let svgString;
      try {
        svgString = await buildSvgForPng();
      } catch (e) {
        alert('PNG export failed: could not load assets. ' + e.message);
        return;
      }
      const url = URL.createObjectURL(new Blob([svgString], { type: 'image/svg+xml;charset=utf-8' }));
      const img = new Image();
      img.onload = () => {
        try {
          const canvas = document.createElement('canvas');
          canvas.width = w * 2; canvas.height = h * 2;
          canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
          canvas.toBlob(blob => {
            URL.revokeObjectURL(url);
            if (blob) downloadBlob(blob, filename('png'));
            else alert('PNG export failed.');
          }, 'image/png');
        } catch (e) {
          URL.revokeObjectURL(url);
          alert('PNG export failed: ' + e.message);
        }
      };
      img.onerror = () => { URL.revokeObjectURL(url); alert('PNG export failed.'); };
      img.src = url;
    });

    // ── Station picker (data mode) ──────────────────────────────────────────

    let _currentStations = [];

    function setMode(mode) {
      document.getElementById('data-panel').style.display    = mode === 'data'   ? '' : 'none';
      document.getElementById('custom-panel').style.display  = mode === 'custom' ? '' : 'none';
      document.getElementById('lineColorGroup').style.display = mode === 'custom' ? '' : 'none';
      document.getElementById('modeData').classList.toggle('active', mode === 'data');
      document.getElementById('modeCustom').classList.toggle('active', mode === 'custom');
    }

    document.getElementById('modeData').addEventListener('click',   () => setMode('data'));
    document.getElementById('modeCustom').addEventListener('click', () => setMode('custom'));

    document.getElementById('trainLine').addEventListener('change', function () {
      const lineId       = this.value;
      const stationGroup = document.getElementById('stationGroup');
      const list         = document.getElementById('trainStationList');
      _currentStations   = [];
      document.getElementById('trainStationSearch').value = '';
      list.style.display = 'none';
      list.innerHTML     = '';
      if (!lineId) { stationGroup.style.display = 'none'; return; }
      stationGroup.style.display = '';
      _currentStations = LINES[lineId].stations;
      renderStationList(_currentStations);
      // Update the hidden lineChoice so render() picks up the right color
      els.lineChoice.value   = lineId;
      els.subtitleText.value = LINES[lineId].defaultSubheader;
      render();
    });

    function renderStationList(stations) {
      const list = document.getElementById('trainStationList');
      if (stations.length === 0) {
        list.innerHTML = '<div class="stop-item no-results">No stations match</div>';
      } else {
        list.innerHTML = stations.map(s =>
          `<div class="stop-item" data-id="${s.id}" data-name="${s.signName || s.name}">${s.name}</div>`
        ).join('');
        list.querySelectorAll('.stop-item').forEach(item =>
          item.addEventListener('click', () => selectStation(item.dataset.id, item.dataset.name))
        );
      }
      list.style.display = '';
    }

    document.getElementById('trainStationSearch').addEventListener('input', function () {
      const q = this.value.toLowerCase();
      const filtered = q
        ? _currentStations.filter(s => s.name.toLowerCase().includes(q))
        : _currentStations;
      renderStationList(filtered);
    });

    async function selectStation(id, name) {
      const lineId  = document.getElementById('trainLine').value;
      const station = LINES[lineId].stations.find(s => s.id === id);
      document.getElementById('trainStationSearch').value       = name;
      document.getElementById('trainStationList').style.display = 'none';
      els.stationName.value  = name;
      els.subtitleText.value = LINES[lineId].defaultSubheader;
      els.lineChoice.value   = lineId;
      render();

      const infoEl = document.getElementById('accessibilityInfo');
      const listEl = document.getElementById('facilityList');
      if (!station?.placeId) { infoEl.style.display = 'none'; return; }
      infoEl.style.display = '';
      listEl.textContent   = 'Loading…';
      try {
        const facilities = await fetchStationFacilities(station.placeId);
        if (facilities.length === 0) {
          listEl.textContent = 'No elevator or escalator data.';
        } else {
          listEl.innerHTML = facilities.map(f => {
            const icon   = f.type === 'ELEVATOR' ? '🛗' : '🔼';
            const status = f.status ? ` — ${f.status.toLowerCase().replace(/_/g, ' ')}` : '';
            return `<div style="padding:3px 0">${icon} ${escapeXml(f.name)}${escapeXml(status)}</div>`;
          }).join('');
        }
      } catch {
        listEl.textContent = 'Could not load accessibility data.';
      }
    }

    // ── Start Over ──────────────────────────────────────────────────────────

    document.getElementById('startOver').addEventListener('click', () => {
      _currentStations = [];
      document.getElementById('trainLine').value             = '';
      document.getElementById('trainStationSearch').value    = '';
      document.getElementById('trainStationList').innerHTML  = '';
      document.getElementById('trainStationList').style.display = 'none';
      document.getElementById('stationGroup').style.display  = 'none';
      els.stationName.value  = 'MBTA Station';
      els.subtitleText.value = '';
      els.lineChoice.value   = 'red';
      els.leftIcon.value     = 'none';
      els.leftIcon2.value    = 'none';
      els.rightIcon.value    = 'none';
      els.rightIcon2.value   = 'none';
      els.showMaps.checked   = false;
      document.getElementById('accessibilityInfo').style.display = 'none';
      document.getElementById('facilityList').textContent        = '';
      setMode('data');
      render();
    });

    // ── Init ────────────────────────────────────────────────────────────────
    setMode('data');
    render();
  </script>
</body>
</html>
