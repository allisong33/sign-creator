		.fill-orange-line { fill: #ED8B00; }
		.fill-blue-line { fill: #003DA5; }
		.fill-silver-line { fill: #7C878E; }
		.fill-commuter-rail { fill: #80276C; }
		.fill-bus { fill: #FFC72C; }
		.fill-ferry { fill: #008EAA; }
		.fill-the-ride { fill: #59BEC9; }

		/* NEUTRALS */
		.fill-white { fill: #FFFFFF; }
		.fill-black { fill: #000000; }
		.fill-dark-gray { fill: #212322; }

		.stroke-black { stroke: #000000; }
		.stroke-white { stroke: #FFFFFF; }
		.stroke-dark-gray { stroke: #212322; }

		/* SHAPE STYLING */
		.s-bg { fill: #FFFFFF; }
		.s-border { fill: none; stroke: #000000; stroke-width: 3; }

		/* TEXT STYLING */
		.t-station {
			font-size: 90px;
			fill: #FFFFFF;
			font-family: "Helvetica Neue", Arial, sans-serif;
			font-weight: 600;
		}
		
		.t-sub {
			font-size: 50px;
			fill: #000000;
			font-family: "Helvetica Neue", Arial, sans-serif;
			font-weight: 600;
		}

		/* ICON STYLING */
		.icon-fill { fill: #000000; }
		.icon-stroke { stroke: #000000; }
	</style>

