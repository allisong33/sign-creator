<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MBTA Bus Stop Sign Maker</title>
<style>
:root{--bg:#f5f1e8;--card:#fff;--ink:#212322;--muted:#666;--border:#d8d2c5}
*{box-sizing:border-box}
body{margin:0;font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Helvetica Neue",Arial,sans-serif;background:var(--bg);color:var(--ink)}
main{max-width:1150px;margin:0 auto;padding:28px}
h1{margin:0 0 8px;font-size:clamp(28px,4vw,44px);letter-spacing:-.04em}
.intro{margin:0 0 24px;color:var(--muted);line-height:1.45}
.app{display:grid;grid-template-columns:minmax(280px,360px) 1fr;gap:20px;align-items:start}
.controls,.preview{background:var(--card);border:1px solid var(--border);border-radius:18px;box-shadow:0 12px 30px rgba(0,0,0,.06)}
.controls{padding:18px;position:sticky;top:16px}
.group{margin-bottom:16px}
label,.group-label{display:block;font-weight:700;font-size:13px;margin-bottom:7px;text-transform:uppercase;letter-spacing:.04em}
input[type=text],textarea{width:100%;border:1px solid var(--border);border-radius:12px;padding:11px 12px;font-size:16px;font-family:inherit;background:#fff}
textarea{min-height:86px;resize:vertical;line-height:1.25}
.check{display:flex;align-items:center;gap:9px;margin:9px 0;font-size:15px;text-transform:none;letter-spacing:0;font-weight:400}
input[type=checkbox]{width:18px;height:18px}
.buttons{display:grid;gap:9px;margin-top:16px}
button{appearance:none;border:0;border-radius:999px;padding:10px 14px;background:var(--ink);color:white;font-weight:700;cursor:pointer;font-family:inherit}
button.secondary{background:#5f625f}
.note{margin-top:14px;color:var(--muted);font-size:13px;line-height:1.4}
.preview{padding:18px;overflow:auto;display:flex;justify-content:center}
.preview svg{display:block;width:min(100%,380px);height:auto;background:#fff}
@media(max-width:850px){main{padding:18px}.app{grid-template-columns:1fr}.controls{position:static}.preview svg{width:min(100%,340px)}}
</style>
</head>
<body>
<main>
<h1>MBTA-Style Bus Stop Sign Maker</h1>
<p class="intro">Create a bus stop sign. Enter route details manually, then export as SVG or PNG.</p>
<div class="app">

<section class="controls">
  <div class="group"><label for="stopNumber">Bus stop number</label><input id="stopNumber" type="text" value="1129" autocomplete="off"></div>
  <div id="route-blocks"></div>
  <button id="addRoute" type="button" class="secondary" style="width:100%;margin-bottom:12px">+ Add Route</button>
  <div class="buttons">
    <button id="openSvg" type="button">Open SVG in New Tab</button>
    <button id="downloadSvg" type="button">Download SVG</button>
    <button id="downloadPng" class="secondary" type="button">Download PNG</button>
  </div>
  <p class="note">Serve over HTTP for ES modules: <code>python3 -m http.server 8080</code></p>
</section>

<section>
  <div class="preview">
    <svg id="main-mbta-sign" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 2065" width="100%" height="100%">
      <g id="background-base">

        <g id="top-yellow-background">
          <path d="M 0 400 V 325 A 350 325 0 0 1 700 325 V 400 Z" fill="#F9B326" />
          <g id="t-logo" transform="translate(350, 200) scale(17.5) translate(-8, -8)">
            <g>
              <path d="M8,0C3.6,0,0,3.6,0,8s3.6,8,8,8s8-3.6,8-8S12.4,0,8,0 M8,15.3C4,15.3,0.7,12,0.7,8C0.7,4,4,0.7,8,0.7 c4,0,7.3,3.3,7.3,7.3C15.3,12,12,15.3,8,15.3C8,15.3,8,15.3,8,15.3" fill="#1C1E23" />
              <path d="M6.7,13.2h2.5V7h3.8V4.4H2.9V7h3.8L6.7,13.2z" fill="#1C1E23" />
            </g>
          </g>
        </g>

        <g id="white-rectangle-background" transform="translate(0, 400)">
          <rect id="dynamic-white-bg" x="0" y="0" width="700" height="1500" fill="#FFFFFF" />

          <g id="route-item-template">
            <g id="route-pill">
              <rect x="37" y="50" width="400" height="200" rx="100" fill="#000000" />
              <text id="dynamic-route-number" x="233" y="150" fill="#FFFFFF" font-family="'Arial Narrow', Arial, sans-serif" font-size="190" font-weight="615" text-anchor="middle" dominant-baseline="central" letter-spacing="0">109</text>
            </g>

            <g id="dynamic-frequency-clock">
              <svg x="460" y="50" width="200" height="200" viewBox="0 0 200 200">
                <circle cx="100" cy="100" r="100" fill="#F9B326" />
                <path d="M 100 22.5 A 77.5 77.5 0 0 1 177.5 100" fill="none" stroke="#000000" stroke-width="25" stroke-linecap="butt" />
                <g id="clock-ticks" fill="#000000">
                  <rect x="97" y="10" width="8" height="25" transform="rotate(0, 100, 100)" />
                  <rect x="97" y="10" width="8" height="25" transform="rotate(90, 100, 100)" />
                  <rect x="97" y="10" width="8" height="25" transform="rotate(120, 100, 100)" />
                  <rect x="97" y="10" width="8" height="25" transform="rotate(150, 100, 100)" />
                  <rect x="97" y="10" width="8" height="25" transform="rotate(180, 100, 100)" />
                  <rect x="97" y="10" width="8" height="25" transform="rotate(210, 100, 100)" />
                  <rect x="97" y="10" width="8" height="25" transform="rotate(240, 100, 100)" />
                  <rect x="97" y="10" width="8" height="25" transform="rotate(270, 100, 100)" />
                  <rect x="97" y="10" width="8" height="25" transform="rotate(300, 100, 100)" />
                  <rect x="97" y="10" width="8" height="25" transform="rotate(330, 100, 100)" />
                </g>
                <text id="dynamic-clock-text" x="100" y="127" fill="#000000" font-family="'Arial Narrow', Arial, sans-serif" font-size="80" font-weight="bold" dx="-0.05em" text-anchor="middle"><tspan letter-spacing="-0.075em">15</tspan></text>
              </svg>
            </g>

            <g id="route-destination-text">
              <foreignObject x="37" y="270" width="626" height="400">
                <div id="dynamic-destination-name" xmlns="http://www.w3.org/1999/xhtml" style="font-family: 'Arial Narrow', Arial, sans-serif; font-size: 100px; font-weight: 600; color: #000000; line-height: 1.1; word-wrap: break-word; margin: 0; height: 100%; width: 100%;">Back Bay Station</div>
              </foreignObject>
            </g>
          </g>

          <g id="extra-routes-container"></g>

          <g id="tow-zone-block">
            <rect x="15" y="1290" width="670" height="200" rx="25" ry="25" fill="#AA202E" />
            <polygon points="610,1343 610,1433 650,1388" fill="#FFFFFF" />
            <text x="350" y="1360" fill="#FFFFFF" font-family="'Arial Narrow', Arial, sans-serif" font-size="70" font-weight="bold" letter-spacing="7" text-anchor="middle">NO STOPPING</text>
            <text x="350" y="1408" fill="#FFFFFF" font-family="'Arial Narrow', Arial, sans-serif" font-size="45" font-weight="bold" letter-spacing="8" text-anchor="middle">$100 FINE</text>
            <text x="350" y="1475" fill="#FFFFFF" font-family="'Arial Narrow', Arial, sans-serif" font-size="70" font-weight="bold" letter-spacing="7" text-anchor="middle">TOW ZONE</text>
          </g>
        </g>

        <g id="bottom-yellow-background">
          <path d="M 0 1900 H 700 V 2030 A 35 35 0 0 1 665 2065 H 35 A 35 35 0 0 1 0 2030 Z" fill="#F9B326" />
          <text x="30" y="1950" fill="#333333" font-family="'Arial Narrow', Arial, sans-serif" font-size="42" font-weight="bold" letter-spacing="2" text-anchor="start">
            <tspan x="30" dy="0">MBTA.COM</tspan>
            <tspan x="30" dy="45">617-222-3200</tspan>
            <tspan x="30" dy="45">617-222-5146 (TTY)</tspan>
          </text>
          <g id="bus-stop-info">
            <text x="670" y="1950" fill="#333333" font-family="'Arial Narrow', Arial, sans-serif" font-size="42" font-weight="bold" letter-spacing="2" text-anchor="end">BUS STOP #</text>
            <text id="dynamic-stop-number" x="670" y="2040" fill="#333333" font-family="'Arial Narrow', Arial, sans-serif" font-size="100" font-weight="bold" letter-spacing="-0.8" text-anchor="end">1129</text>
          </g>
        </g>

        <path id="outer-perimeter-border" d="M 0 400 V 325 A 350 325 0 0 1 700 325 V 2030 A 35 35 0 0 1 665 2065 H 35 A 35 35 0 0 1 0 2030 Z" fill="none" stroke="#CCCCCC" stroke-width="3" />
      </g>
    </svg>
  </div>
</section>

</div>
</main>

<template id="route-block-template">
  <div class="route-block" style="border:1px solid var(--border);border-radius:12px;padding:12px;margin-bottom:10px">
    <div class="group"><label>Route number</label><input type="text" class="route-number" value="" autocomplete="off"></div>
    <div class="group"><label>Destination text</label><textarea class="route-dest" style="min-height:70px"></textarea></div>
    <div class="group"><label class="check"><input type="checkbox" class="route-clock">Show frequent-service clock</label></div>
    <button type="button" class="remove-route secondary" style="width:100%">Remove route</button>
  </div>
</template>

<script type="module">
import { renderSign, getSignSvgString } from './src/bus/renderer.js';

const MAX_ROUTES = 5;

function getRouteBlocks() {
  return Array.from(document.querySelectorAll('#route-blocks .route-block'));
}

function currentState() {
  const stopInput = document.getElementById('stopNumber');
  return {
    stopNumber: stopInput.value.trim() || '',
    routes: getRouteBlocks().map(block => ({
      routeNumber: block.querySelector('.route-number').value.trim() || '',
      displayText: block.querySelector('.route-dest').value.trim()   || '',
      showClock:   block.querySelector('.route-clock').checked,
    })),
  };
}

function refresh() { renderSign(currentState()); }

function syncButtons() {
  const blocks = getRouteBlocks();
  document.getElementById('addRoute').disabled = blocks.length >= MAX_ROUTES;
  blocks.forEach(b => {
    b.querySelector('.remove-route').disabled = blocks.length <= 1;
  });
}

function addRouteBlock(defaults = {}) {
  const tmpl = document.getElementById('route-block-template');
  const clone = tmpl.content.cloneNode(true);
  const block = clone.querySelector('.route-block');
  if (defaults.routeNumber !== undefined) block.querySelector('.route-number').value = defaults.routeNumber;
  if (defaults.displayText  !== undefined) block.querySelector('.route-dest').value   = defaults.displayText;
  if (defaults.showClock    !== undefined) block.querySelector('.route-clock').checked = defaults.showClock;

  block.querySelector('.remove-route').addEventListener('click', () => {
    block.remove(); syncButtons(); refresh();
  });
  block.querySelectorAll('input, textarea').forEach(el => {
    el.addEventListener('input',  refresh);
    el.addEventListener('change', refresh);
  });

  document.getElementById('route-blocks').appendChild(block);
  syncButtons();
}

document.getElementById('addRoute').addEventListener('click', () => {
  addRouteBlock({ routeNumber: '', displayText: '', showClock: false });
  refresh();
});

document.getElementById('stopNumber').addEventListener('input',  refresh);
document.getElementById('stopNumber').addEventListener('change', refresh);

// Export helpers
function slug(v) { return String(v).toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-+|-+$/g, '') || 'bus-stop'; }
function firstRoute() { return getRouteBlocks()[0]; }
function filename(ext) {
  const r = firstRoute();
  const rn = r ? r.querySelector('.route-number').value : '';
  return `bus-stop-${slug(rn)}-stop-${slug(document.getElementById('stopNumber').value)}.${ext}`;
}
function svgBlob() { return new Blob([getSignSvgString()], { type: 'image/svg+xml;charset=utf-8' }); }
function downloadBlob(blob, name) {
  const url = URL.createObjectURL(blob), a = document.createElement('a');
  a.href = url; a.download = name; document.body.appendChild(a); a.click(); a.remove();
  URL.revokeObjectURL(url);
}

document.getElementById('openSvg').addEventListener('click', () => {
  const url = URL.createObjectURL(svgBlob());
  window.open(url, '_blank', 'noopener,noreferrer');
  setTimeout(() => URL.revokeObjectURL(url), 60000);
});
document.getElementById('downloadSvg').addEventListener('click', () => downloadBlob(svgBlob(), filename('svg')));
document.getElementById('downloadPng').addEventListener('click', () => {
  const vb = document.getElementById('main-mbta-sign').getAttribute('viewBox').split(' ').map(Number);
  const scale = 2, url = URL.createObjectURL(svgBlob());
  const img = new Image();
  img.onload = () => {
    const c = document.createElement('canvas');
    c.width = vb[2] * scale; c.height = vb[3] * scale;
    c.getContext('2d').drawImage(img, 0, 0, c.width, c.height);
    c.toBlob(b => { URL.revokeObjectURL(url); if (b) downloadBlob(b, filename('png')); else alert('PNG export failed.'); }, 'image/png');
  };
  img.onerror = () => { URL.revokeObjectURL(url); alert('PNG export failed.'); };
  img.src = url;
});

// Initialize with one pre-filled route block
addRouteBlock({ routeNumber: '109', displayText: 'Back Bay Station', showClock: true });
refresh();
</script>
</body>
</html>
